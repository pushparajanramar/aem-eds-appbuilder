<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Device Info Plugin</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; }
    button { padding: 10px 20px; font-size: 14px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; background: #1473e6; color: #fff; }
    button:hover { background: #0d66d0; }
    .preview { margin: 16px 0; padding: 12px; border: 1px solid #e0e0e0; border-radius: 4px; max-height: 300px; overflow: auto; font-size: 13px; }
    .status { margin: 8px 0; color: #666; font-size: 13px; }
    .error { color: #d32f2f; }
  </style>
</head>
<body>
  <script type="module" src="device-plugin.js"></script>
</body>
</html>

name: Deploy Fastly Compute

# Triggers when Fastly Compute source files change on main.
on:
  push:
    branches:
      - main
    paths:
      - 'fastly-compute/src/**'
      - 'fastly-compute/fastly.toml'
      - 'fastly-compute/package.json'
  workflow_dispatch: {}

concurrency:
  group: deploy-fastly-compute
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Validate before deploy ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fastly-compute/package.json

      - name: Install dependencies
        working-directory: fastly-compute
        run: npm ci --ignore-scripts

      - name: Lint
        working-directory: fastly-compute
        run: npm run lint

      - name: Unit tests
        working-directory: fastly-compute
        run: npm test

  # ─── Deploy to Fastly Compute ───────────────────────────────────────────
  deploy:
    name: Deploy to Fastly Compute
    runs-on: ubuntu-latest
    needs: test
    environment: production
    env:
      FASTLY_API_TOKEN: ${{ secrets.FASTLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Fastly CLI
        run: npm install -g @fastly/cli

      - name: Install dependencies
        working-directory: fastly-compute
        run: npm ci --ignore-scripts

      - name: Build and deploy to Fastly Compute
        working-directory: fastly-compute
        run: fastly compute publish --token "$FASTLY_API_TOKEN"
